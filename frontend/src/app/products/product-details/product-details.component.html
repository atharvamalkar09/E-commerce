<app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

<div class="product-container" *ngIf="product && !isLoading">
  <div class="image-section">
    <img [src]="getImageUrl(product.imagePath)" [alt]="product.name" (error)="onImageError($event)" class="main-image" />

    <div *ngIf="isEditing" class="edit-image-upload mt-2">
      <label class="fw-bold">Change Product Image:</label>
      <input type="file" (change)="onFileSelected($event)" accept="image/*" class="form-control" />
    </div>
  </div>

  <div class="info-section">
    <div *ngIf="!isEditing">
      <h1>{{ product.name }}</h1>
      <p class="description">{{ product.description }}</p>
      <h2 class="price">Price: ${{ product.price }}</h2>
      <p class="stock">
        Status:
        <span [class.text-danger]="product.stockQuantity <= 0">
          {{ product.stockQuantity > 0 ? "In Stock (" + product.stockQuantity + ")" : "Out of Stock" }}
        </span>
      </p>
    </div>

    <div *ngIf="isEditing" class="edit-form">
      <label>Name:</label>
      <input type="text" [(ngModel)]="product.name" class="form-control mb-2" />

      <label>Description:</label>
      <textarea [(ngModel)]="product.description" class="form-control mb-2"></textarea>

      <label>Price ($):</label>
      <input type="number" [(ngModel)]="product.price" class="form-control mb-2" />

      <label>Stock Quantity:</label>
      <input type="number" [(ngModel)]="product.stockQuantity" class="form-control mb-2" />
    </div>

    <hr />

    <div class="actions">
      <div *ngIf="authService.currentUserValue?.role !== 'admin'; else adminControls">
        <div class="cart-controls mb-2" *ngIf="product.stockQuantity > 0">
          <button (click)="addToCart()" class="btn btn-primary w-100">Add to Cart</button>
        </div>
        <button (click)="shareProduct()" class="btn btn-outline-secondary w-100">
          <i class="fas fa-share"></i> Share Product
        </button>
      </div>

      <ng-template #adminControls>
        <div class="admin-buttons d-flex gap-2">
          <button *ngIf="!isEditing" (click)="toggleEdit()" class="btn btn-secondary">Edit</button>
          <button *ngIf="!isEditing" (click)="confirmDelete()" class="btn btn-danger">Delete</button>

          <div *ngIf="isEditing" class="edit-actions d-flex gap-2 w-100">
            <button (click)="saveProduct()" class="btn btn-success flex-grow-1">Save</button>
            <button (click)="toggleEdit()" class="btn btn-outline-danger">Cancel</button>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</div>

<app-confirm-dialog 
  *ngIf="showConfirm" 
  [message]="confirmMessage" 
  (confirmed)="handleConfirmation($event)">
</app-confirm-dialog>
