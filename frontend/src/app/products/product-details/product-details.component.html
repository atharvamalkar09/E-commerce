<div class="product-container" *ngIf="product">
  <div class="image-section">
    <img
      [src]="getImageUrl(product.imagePath)"
      [alt]="product.name"
      (error)="onImageError($event)"
      class="main-image"
    />

    <div *ngIf="isEditing" class="edit-image-upload">
      <label>Change Product Image:</label>
      <input type="file" (change)="onFileSelected($event)" accept="image/*" />
    </div>
  </div>

  <div class="info-section">
    <div *ngIf="!isEditing">
      <h1>{{ product.name }}</h1>
      <p class="description">{{ product.description }}</p>
      <h2 class="price">Price: ${{ product.price }}</h2>

      <p class="stock">
        Status:
        <span [class.text-danger]="product.stockQuantity <= 0">
          {{
            product.stockQuantity > 0
              ? "In Stock (" + product.stockQuantity + ")"
              : "Out of Stock"
          }}
        </span>
      </p>
    </div>

    <div *ngIf="isEditing" class="edit-form">
      <label>Name:</label>
      <input type="text" [(ngModel)]="product.name" class="form-control mb-2" />

      <label>Description:</label>
      <textarea
        [(ngModel)]="product.description"
        class="form-control mb-2"
      ></textarea>

      <label>Price ($):</label>
      <input
        type="number"
        [(ngModel)]="product.price"
        class="form-control mb-2"
      />

      <label>Stock Quantity:</label>
      <input
        type="number"
        [(ngModel)]="product.stockQuantity"
        class="form-control mb-2"
      />
    </div>

    <hr />

    <div class="actions">
      <div
        *ngIf="
          authService.currentUserValue?.role !== 'admin';
          else adminControls
        "
      >
        <div class="cart-controls" *ngIf="product.stockQuantity > 0">
          <button (click)="addToCart()" class="btn-primary">Add to Cart</button>
        </div>
        <button (click)="shareProduct()" class="btn-outline">
          Share Product
        </button>
      </div>

      <ng-template #adminControls>
        <div class="admin-buttons">
          <button
            *ngIf="!isEditing"
            (click)="toggleEdit()"
            class="btn-secondary"
          >
            Edit Product
          </button>

          <button (click)="confirmDelete()" class="btn-danger">
            Delete Product
          </button>

          <div *ngIf="isEditing" class="edit-actions">
            <button (click)="saveProduct()" class="btn-success">
              Save Changes
            </button>
            <button (click)="toggleEdit()" class="btn-danger">Cancel</button>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</div>
