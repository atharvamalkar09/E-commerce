<div class="product-page-container">
  
  <div class="filter-bar">
    <div class="filter-container">
      <div class="search-wrapper">
        <input class="filter-search" type="text" placeholder="Search products..." (input)="onSearchInput($event)" />
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <div class="filter-controls">
        <select [(ngModel)]="filters.typeId" (change)="onTypeChange()" class="filter-select">
          <option value="">All Types</option>
          <option *ngFor="let t of types" [value]="t.id">{{ t.name }}</option>
        </select>

        <select [(ngModel)]="filters.catId" (change)="onCategoryChange()" [disabled]="!filters.typeId" class="filter-select">
          <option value="">All Categories</option>
          <option *ngFor="let c of filteredCategories" [value]="c.id">{{ c.name }}</option>
        </select>

        <select [(ngModel)]="filters.subCatId" (change)="applyFilters()" [disabled]="!filters.catId" class="filter-select">
          <option value="">All Sub-Categories</option>
          <option *ngFor="let s of filteredSubCategories" [value]="s.id">{{ s.name }}</option>
        </select>

        <div class="price-range">
          <input type="number" min="5" placeholder="Min" [(ngModel)]="filters.minPrice" (change)="applyFilters()" class="price-input" />
          <input type="number" min="5" placeholder="Max" [(ngModel)]="filters.maxPrice" (change)="applyFilters()" class="price-input" />
        </div>

        <button class="filter-btn" type="button" (click)="loadProducts()">Filter</button>
      </div>
    </div>
  </div>

  <app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

  <div class="page-body" *ngIf="!isLoading">
    <div class="empty-state" *ngIf="products.length === 0">
      <p>No products match your search.</p>
    </div>

    <div class="product-grid" *ngIf="products.length > 0">
      <div class="product-card" *ngFor="let product of products; trackBy: trackByProductId">
        <div class="card-img" [routerLink]="['/products', product.id]">
          <img [src]="getImageUrl(product.imagePath)" (error)="onImageError($event)" alt="{{ product.name }}" />
        </div>
        <div class="card-info">
          <h3 class="card-name" [routerLink]="['/products', product.id]">{{ product.name }}</h3>
          <p class="description">{{ product.description }}</p>
          <div class="card-bottom">
            <span class="card-price">${{ product.price }}</span>
            <span class="card-stock" [class.out]="product.stockQuantity === 0">
              {{ product.stockQuantity > 0 ? 'In Stock' : 'Out of Stock' }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <div class="pagination" *ngIf="products.length > 0">
      <button class="page-btn" [disabled]="filters.page === 1" (click)="filters.page = filters.page - 1; loadProducts()">-</button>
      <span class="page-num">Page {{ filters.page }}</span>
      <button class="page-btn" [disabled]="products.length < filters.limit" (click)="filters.page = filters.page + 1; loadProducts()">+</button>
    </div>
  </div>
</div>
