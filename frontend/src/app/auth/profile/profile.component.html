<div class="profile-container" *ngIf="user.name">
  <h1>Account Settings</h1>

  <p *ngIf="message" [ngClass]="{'success-msg': !isError, 'error-msg': isError}">
    {{ message }}
  </p>

  <section class="profile-section">
    <h3>Personal Information</h3>
    <form (ngSubmit)="updateProfile()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="user.name" name="name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="user.email" name="email" required>
      </div>
      <button type="submit" class="btn-primary">Update Personal Info</button>
    </form>
  </section>

  <hr class="separator">

  <section class="profile-section">
    <h3>Change Password</h3>
    <form (ngSubmit)="changePassword()">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" [(ngModel)]="passwordData.oldPassword" name="oldPass" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" [(ngModel)]="passwordData.newPassword" name="newPass" required>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" [(ngModel)]="passwordData.confirmPassword" name="confPass" required>
      </div>
      <button type="submit" class="btn-danger">Update Password</button>
    </form>
  </section>
</div>
