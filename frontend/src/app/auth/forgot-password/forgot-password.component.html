<div class="container mt-5">
      <div class="card mx-auto" style="max-width: 400px;">
        <div class="card-body">
          <h3>Forgot Password</h3>
          <p class="text-muted">Enter your email to receive a reset code.</p>
          
          <div class="mb-3">
            <input type="email" [(ngModel)]="email" class="form-control" placeholder="Email Address">
          </div>
          
          <button class="btn btn-primary w-100" (click)="sendCode()" [disabled]="loading">
            {{ loading ? 'Generating...' : 'Get Reset Code' }}
          </button>

          <div *ngIf="generatedCode" class="alert alert-success mt-3">
            <strong>Your Reset Code: {{ generatedCode }}</strong>
            <p class="small mb-0">Please copy this code and use it to reset your password.</p>
            <button class="btn btn-sm btn-link" (click)="goToReset()">Go to Reset Form</button>
          </div>

          <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
        </div>
      </div>
    </div>
