<div class="forgot-password-page">
  <div class="forgot-password-card">
    <h2>Forgot Password</h2>
    <p>Enter your email to receive a reset code.</p>

    <div class="field">
      <label for="email">Email Address</label>
      <input 
        type="email" 
        id="email"
        [(ngModel)]="email" 
        placeholder="email@example.com">
    </div>

    <button class="btn-submit" (click)="sendCode()" [disabled]="loading">
      {{ loading ? 'Generating...' : 'Get Reset Code' }}
    </button>

    <div *ngIf="generatedCode" class="success-box">
      <strong>Your Reset Code: {{ generatedCode }}</strong>
      <p>Please copy this code and use it to reset your password.</p>
      <button (click)="goToReset()">Go to Reset Form</button>
    </div>

    <div *ngIf="error" class="err-box">{{ error }}</div>

    <div class="auth-links">
      <p><a routerLink="/auth/login">Back to Login</a></p>
    </div>
  </div>
</div>
