
<app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

<div class="login-container" *ngIf="!isLoading" style="padding: 20px; max-width: 400px; margin: auto;">
  <h2>Login</h2>

  <p *ngIf="errMessage" style="color: red; font-weight: bold;">{{ errMessage }}</p>

  <form (ngSubmit)="login()">
    <div class="form-group">
      <label>Email:</label><br>
      <input 
        type="email" 
        name="email" 
        class="form-control"
        [(ngModel)]="credentials.email" 
        required>
    </div>

    <br>

    <div class="form-group">
      <label>Password:</label><br>
      <input 
        type="password" 
        name="password" 
        class="form-control"
        [(ngModel)]="credentials.password" 
        required>
    </div>

    <br>

    <button type="submit" class="btn-signin" [disabled]="isLoading">
      Sign In
    </button>
  </form>

  <div style="margin-top: 15px;">
    <p>New user? <a routerLink="/auth/register">Create an account</a></p>
    <p><a routerLink="/auth/forgot-password">Forgot Password?</a></p>
  </div>
</div>
