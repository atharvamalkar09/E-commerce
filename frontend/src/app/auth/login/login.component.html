<app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

<div class="auth-page" *ngIf="!isLoading">
  <div class="auth-card">
    <h2>Login</h2>

    <div class="err-box" *ngIf="errMessage">{{ errMessage }}</div>

    <form #loginForm="ngForm" (ngSubmit)="login(loginForm)" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="credentials.email"
          #email="ngModel"
          required
          email>
        <p class="field-err" *ngIf="email.invalid && email.touched">
          <span *ngIf="email.errors?.['required']">Email is required.</span>
          <span *ngIf="email.errors?.['email']">Please enter a valid email.</span>
        </p>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="credentials.password"
          #password="ngModel"
          required
          minlength="6">
        <p class="field-err" *ngIf="password.invalid && password.touched">
          <span *ngIf="password.errors?.['required']">Password is required.</span>
          <span *ngIf="password.errors?.['minlength']">Min 6 characters.</span>
        </p>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || isLoading">
        Sign In
      </button>
    </form>

    <div class="auth-links">
      <p>New user? <a routerLink="/auth/register">Create an account</a></p>
      <p><a routerLink="/auth/forgot-password">Forgot Password?</a></p>
    </div>
  </div>
</div>
