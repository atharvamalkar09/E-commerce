<app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

<div class="auth-page">
  <div class="auth-card">
    <h2>Create Account</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Full Name</label>
        <input 
          type="text" 
          formControlName="name" 
          placeholder="John Doe" />
        <p class="field-err" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          Name must be at least 3 characters.
        </p>
      </div>

      <div class="field">
        <label>Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="email@example.com" />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••" />
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="••••••••" />
        <p class="field-err" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
          Passwords do not match.
        </p>
      </div>

      <div class="err-box" *ngIf="errMessage">{{ errMessage }}</div>

      <button type="submit" class="btn-submit" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? "Registering..." : "Sign Up" }}
      </button>
    </form>

    <app-confirm-dialog
      *ngIf="showDialog"
      [message]="dialogMessage"
      (confirmed)="onDialogConfirm($event)">
    </app-confirm-dialog>

    <div class="auth-links">
      <p>Already have an account? <a routerLink="/auth/login">Login</a></p>
    </div>
  </div>
</div>
