<app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

<div class="user-mgmt-container" *ngIf="!isLoading">
  <h2>Customer Management</h2>
  <br>


  <table class="styled-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>
          <span [class]="user.isLocked ? 'label-locked' : 'label-active'">
            {{ user.isLocked ? 'LOCKED' : 'ACTIVE' }}
          </span>
        </td>
        <td>
          <button 
            (click)="openLockModal(user)" 
            [class]="user.isLocked ? 'btn-unlock' : 'btn-lock'">
            {{ user.isLocked ? 'Unlock' : 'Lock User' }}
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<app-confirm-dialog 
  *ngIf="showConfirm" 
  [message]="confirmMessage" 
  (confirmed)="handleConfirmation($event)">
</app-confirm-dialog>
