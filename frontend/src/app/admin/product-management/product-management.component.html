<div class="container mt-4">
  <div class="admin-card card p-4 shadow-sm">
    <h2 class="mb-4">Add New Product</h2>
    <form (ngSubmit)="submitProduct()" #productForm="ngForm">
      
      <div class="form-group mb-3">
        <label class="fw-bold">Product Name</label>
        <input type="text" class="form-control" [(ngModel)]="product.name" name="name" required placeholder="e.g. Gaming Laptop" />
      </div>

      <div class="form-group mb-3">
        <label class="fw-bold">Description</label>
        <textarea class="form-control" [(ngModel)]="product.description" name="description" rows="3"></textarea>
      </div>

      <div class="row">
        <div class="col-md-4">
          <div class="form-group mb-3">
            <label class="fw-bold">Type</label>
            <input list="typeOptions" class="form-control" [(ngModel)]="product.typeName" name="typeName" required placeholder="Select or type new...">
            <datalist id="typeOptions">
              <option *ngFor="let t of types" [value]="t.name"></option>
            </datalist>
          </div>
        </div>

        <div class="col-md-4">
          <div class="form-group mb-3">
            <label class="fw-bold">Category</label>
            <input list="catOptions" class="form-control" [(ngModel)]="product.categoryName" name="categoryName" required placeholder="Select or type new...">
            <datalist id="catOptions">
              <option *ngFor="let c of categories" [value]="c.name"></option>
            </datalist>
          </div>
        </div>

        <div class="col-md-4">
          <div class="form-group mb-3">
            <label class="fw-bold">Sub-Category</label>
            <input list="subOptions" class="form-control" [(ngModel)]="product.subCategoryName" name="subCategoryName" required placeholder="Select or type new...">
            <datalist id="subOptions">
              <option *ngFor="let s of subCategories" [value]="s.name"></option>
            </datalist>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group mb-3">
            <label class="fw-bold">Price ($)</label>
            <input type="number" class="form-control" [(ngModel)]="product.price" name="price" required />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group mb-3">
            <label class="fw-bold">Stock</label>
            <input type="number" class="form-control" [(ngModel)]="product.stock" name="stock" required />
          </div>
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="fw-bold">Product Image</label>
        <input type="file" class="form-control" (change)="onFileSelected($event)" accept="image/*" />
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="!productForm.valid">
        Save Product & Structure
      </button>
    </form>
  </div>
</div>
